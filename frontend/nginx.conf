server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # This is critical for React Router — without it, refreshing
        # on /dashboard returns a 404 from nginx instead of loading the app
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|svg|ico)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
